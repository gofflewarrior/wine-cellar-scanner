/* Cellar view */

.pick-label { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: #f7f5f2; border: 1.5px dashed #ccc; border-radius: 8px; font-size: 13px; font-weight: 500; color: #555; cursor: pointer; margin-bottom: 10px; }
.thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.thumb { width: 64px; height: 64px; border-radius: 6px; object-fit: cover; border: 1px solid #ddd; }

.wine-action-btn.danger { color: #c0392b; background: #fdf0f0; border-color: #f5c1c1; }
.ws-link { font-size: 11px; color: #555; border: 1px solid #ddd; border-radius: 5px; padding: 4px 8px; text-decoration: none; display: inline-block; margin-top: 6px; }
.cond-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid #e0ddd8; background: #fff; cursor: pointer; color: #888; }
.tab.active { background: #1a1916; color: #fff; border-color: #1a1916; }
.export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.export-btn { padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; }
.empty { text-align: center; padding: 32px 16px; color: #bbb; font-size: 14px; }
textarea.edit-field { width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; font-family: inherit; resize: none; min-height: 60px; margin-bottom: 8px; }
select.edit-field { width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; font-family: inherit; background: #fff; margin-bottom: 8px; }
.edit-label { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }

<body>
<div class="app" id="app">
    <div class="auth-box">
      <div class="auth-title">🍷 Cellar Legacy</div>
      <div class="auth-sub">Your personal wine cellar manager</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="renderAuth(&#39;login&#39;)">Sign in</button>
        <button class="auth-tab " onclick="renderAuth(&#39;signup&#39;)">Create account</button>
      </div>
      <div id="auth-err"></div>
      <div class="field-group">
        <input type="email" id="auth-email" placeholder="Email address">
        <input type="password" id="auth-pass" placeholder="Password">
        
      </div>
      <button class="btn-primary" onclick="authSubmit(&#39;login&#39;)">Sign in</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.3 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.8 13.2 17.9 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"></path><path fill="#FBBC05" d="M10.9 28.6A14.8 14.8 0 019.5 24c0-1.6.3-3.1.7-4.6L2.3 13.3A23.9 23.9 0 000 24c0 3.9.9 7.5 2.5 10.8l8.4-6.2z"></path><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.2-8.4 2.2-6.1 0-11.2-3.7-13.1-9l-7.9 6.1C6.9 42.6 14.8 48 24 48z"></path></svg>
        Continue with Google
      </button>
    </div></div>

<script>
const SUPABASE_URL = 'https://gxucxzjwwkahccxqjhwv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4dWN4emp3d2thaGNjeHFqaHd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzA0MTYsImV4cCI6MjA5MzU0NjQxNn0.v6r20dMoNn52t4PCcaRWkpmCXuHNoCf1G7e9iCtFZV4';
const PROXY_URL = 'https://api.cellarlegacy.com/';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const app = document.getElementById('app');
let currentUser = null;
let currentCellar = null;
let currentWines = [];
let scanFiles = [];
let activeTab = 'wines';

// ── ROUTER ──────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  if (currentUser) renderCellars();
  else renderAuth();
  sb.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    if (currentUser) renderCellars();
    else renderAuth();
  });
}

// ── AUTH ─────────────────────────────────────────────────
function renderAuth(tab = 'login') {
  app.innerHTML = `
    <div class="auth-box">
      <div class="auth-title">🍷 Cellar Legacy</div>
      <div class="auth-sub">Your personal wine cellar manager</div>
      <div class="auth-tabs">
        <button class="auth-tab ${tab==='login'?'active':''}" onclick="renderAuth('login')">Sign in</button>
        <button class="auth-tab ${tab==='signup'?'active':''}" onclick="renderAuth('signup')">Create account</button>
      </div>
      <div id="auth-err"></div>
      <div class="field-group">
        <input type="email" id="auth-email" placeholder="Email address" />
        <input type="password" id="auth-pass" placeholder="Password" />
        ${tab==='signup' ? '<input type="password" id="auth-pass2" placeholder="Confirm password" />' : ''}
      </div>
      <button class="btn-primary" onclick="authSubmit('${tab}')">${tab==='login'?'Sign in':'Create account'}</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.2 30.3 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.8 13.2 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.9 28.6A14.8 14.8 0 019.5 24c0-1.6.3-3.1.7-4.6L2.3 13.3A23.9 23.9 0 000 24c0 3.9.9 7.5 2.5 10.8l8.4-6.2z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.2-8.4 2.2-6.1 0-11.2-3.7-13.1-9l-7.9 6.1C6.9 42.6 14.8 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>`;
}

async function authSubmit(tab) {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-err');
  errEl.innerHTML = '';
  if (!email || !pass) { errEl.innerHTML = '<div class="auth-err">Please enter email and password.</div>'; return; }
  if (tab === 'signup') {
    const pass2 = document.getElementById('auth-pass2').value;
    if (pass !== pass2) { errEl.innerHTML = '<div class="auth-err">Passwords do not match.</div>'; return; }
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) { errEl.innerHTML = `<div class="auth-err">${error.message}</div>`; return; }
    errEl.innerHTML = '<div class="auth-err" style="color:#1a7a4a;background:#f0fdf4;border-color:#a7f3d0;">Account created! Check your email to confirm.</div>';
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.innerHTML = `<div class="auth-err">${error.message}</div>`; }
  }
}

async function googleLogin() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
}

// ── CELLARS ──────────────────────────────────────────────
async function renderCellars() {
  currentCellar = null; scanFiles = [];
  app.innerHTML = `
    <div class="top-bar">
      <div class="app-name">🍷 Cellar Legacy</div>
      <div class="user-menu">
        <span class="user-email">${currentUser.email || ''}</span>
        <button class="btn-signout" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <div class="section-title">My Cellars</div>
    <button class="btn-add" onclick="showAddCellar()">+ New cellar</button>
    <div id="cellar-list"><div class="empty">Loading…</div></div>`;
  await loadCellars();
}

async function loadCellars() {
  const { data, error } = await sb.from('cellars').select('*, wines(count)').eq('user_id', currentUser.id).order('created_at');
  const el = document.getElementById('cellar-list');
  if (error || !data.length) { el.innerHTML = '<div class="empty">No cellars yet. Create one to get started.</div>'; return; }
  el.innerHTML = data.map(c => `
    <div class="cellar-card" onclick="openCellar('${c.id}','${escHtml(c.name)}')">
      <div class="cellar-name">${escHtml(c.name)}</div>
      <div class="cellar-meta">${c.description ? escHtml(c.description) + ' · ' : ''}${c.wines[0].count} wines</div>
    </div>`).join('');
}

function showAddCellar() {
  showModal(`
    <div class="modal-title">New cellar</div>
    <label class="edit-label">Name</label>
    <input type="text" id="mc-name" placeholder="e.g. Burgundy Collection" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:7px;font-size:14px;margin-bottom:8px;" />
    <label class="edit-label">Description (optional)</label>
    <input type="text" id="mc-desc" placeholder="e.g. Top shelf reds" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:7px;font-size:14px;margin-bottom:4px;" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1;margin:0;" onclick="createCellar()">Create</button>
    </div>`);
}

async function createCellar() {
  const name = document.getElementById('mc-name').value.trim();
  if (!name) return;
  const { error } = await sb.from('cellars').insert({ name, description: document.getElementById('mc-desc').value.trim(), user_id: currentUser.id });
  if (!error) { closeModal(); renderCellars(); }
}

async function signOut() { await sb.auth.signOut(); }

// ── CELLAR VIEW ──────────────────────────────────────────
async function openCellar(id, name) {
  currentCellar = { id, name };
  scanFiles = []; activeTab = 'wines';
  app.innerHTML = `
    <button class="back-btn" onclick="renderCellars()">← All cellars</button>
    <div class="cellar-header">
      <div class="cellar-title">${escHtml(name)}</div>
      <div class="cellar-actions">
        <div class="icon-btn" onclick="showRenameCellar()" title="Rename">✏️</div>
        <div class="icon-btn" onclick="confirmDeleteCellar()" title="Delete">🗑️</div>
      </div>
    </div>
    <div class="vpn-notice">📡 If analysis fails, enable a VPN (e.g. <strong>Proton VPN</strong>) and retry.</div>
    <div class="scan-section">
      <div class="scan-title">📷 Scan wines</div>
      <label class="pick-label" for="fp">📷 Add photos or video</label>
      <input type="file" id="fp" accept="image/*,video/*" multiple style="position:fixed;top:-100px;left:-100px;width:1px;height:1px;opacity:0;">
      <div class="thumbs" id="thumbs"></div>
      <textarea id="scan-notes" placeholder="Notes (optional) — e.g. top shelf, bin A3…" style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;resize:none;margin-bottom:8px;" rows="2"></textarea>
      <button class="scan-btn" id="scan-btn" disabled onclick="doScan()">Analyse &amp; add to cellar</button>
    </div>
    <div id="scan-status"></div>
    <div class="tabs">
      <button class="tab active" id="tab-wines" onclick="switchTab('wines')">Wines</button>
      <button class="tab" id="tab-export" onclick="switchTab('export')">Export</button>
    </div>
    <div id="wine-count" class="wine-count"></div>
    <div id="wine-list"><div class="empty">Loading…</div></div>`;

  document.getElementById('fp').addEventListener('change', function() {
    if (!this.files || !this.files.length) return;
    scanFiles = [...scanFiles, ...Array.from(this.files)].slice(0, 6);
    renderThumbs();
    document.getElementById('scan-btn').disabled = false;
  });

  await loadWines();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-wines').className = 'tab' + (tab==='wines'?' active':'');
  document.getElementById('tab-export').className = 'tab' + (tab==='export'?' active':'');
  renderWineList();
}

async function loadWines() {
  const { data, error } = await sb.from('wines').select('*').eq('cellar_id', currentCellar.id).order('created_at', { ascending: false });
  currentWines = data || [];
  renderWineList();
}

function renderWineList() {
  const countEl = document.getElementById('wine-count');
  const listEl = document.getElementById('wine-list');
  if (!countEl || !listEl) return;

  if (activeTab === 'export') {
    if (!currentWines.length) { listEl.innerHTML = '<div class="empty">No wines to export yet.</div>'; countEl.textContent = ''; return; }
    countEl.textContent = '';
    listEl.innerHTML = `<div class="export-row">
      <button class="export-btn" onclick="exportCSV()">Download CSV</button>
      <button class="export-btn" onclick="exportJSON()">Download JSON</button>
    </div>`;
    return;
  }

  if (!currentWines.length) { listEl.innerHTML = '<div class="empty">No wines yet. Scan some bottles to get started.</div>'; countEl.textContent = ''; return; }
  countEl.textContent = `${currentWines.length} wine${currentWines.length!==1?'s':''} in this cellar`;
  listEl.innerHTML = currentWines.map(w => wineCardHTML(w)).join('');
}

function wineCardHTML(w) {
  const dot = condDot(w.condition);
  const q = encodeURIComponent([w.producer, w.vintage, w.appellation].filter(Boolean).join(' '));
  return `<div class="wine-card" id="wc-${w.id}">
    <div class="wine-card-top">
      <div class="wine-producer">${escHtml(w.producer||'Unknown')}</div>
      ${w.vintage ? `<span class="wine-vintage">${escHtml(w.vintage)}</span>` : ''}
    </div>
    ${w.appellation ? `<div class="wine-app">${escHtml(w.appellation)}</div>` : ''}
    <div class="wine-grid">
      <div class="wine-field"><label>Varietal</label><span>${escHtml(w.varietal||'—')}</span></div>
      <div class="wine-field"><label>Condition</label><span>${dot}${escHtml(w.condition||'—')}</span></div>
      <div class="wine-field"><label>Format</label><span>${escHtml(w.format||'—')}</span></div>
      <div class="wine-field"><label>Quantity</label><span>${w.quantity??'—'}</span></div>
    </div>
    ${w.notes ? `<div class="wine-notes-text">${escHtml(w.notes)}</div>` : ''}
    <a class="ws-link" href="https://www.wine-searcher.com/find/${q}" target="_blank">Search price ↗</a>
    <div class="wine-card-actions">
      <button class="wine-action-btn" onclick="editWine('${w.id}')">Edit</button>
      <button class="wine-action-btn" onclick="moveWine('${w.id}')">Move</button>
      <button class="wine-action-btn danger" onclick="deleteWine('${w.id}')">Delete</button>
    </div>
  </div>`;
}

function condDot(c) {
  const s = (c||'').toLowerCase();
  const col = s.includes('excellent')?'#1D9E75':s.includes('good')?'#639922':s.includes('fair')?'#BA7517':s.includes('poor')?'#E24B4A':'#bbb';
  return `<span class="cond-dot" style="background:${col}"></span>`;
}

// ── SCAN ─────────────────────────────────────────────────
function renderThumbs() {
  const el = document.getElementById('thumbs');
  if (!el) return;
  el.innerHTML = scanFiles.map(f => f.type.startsWith('video/')
    ? `<div class="thumb-video">🎬</div>`
    : `<img class="thumb" src="${URL.createObjectURL(f)}" />`).join('');
}

async function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { if (w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.75;
      const shrink=()=>{
        const b64=c.toDataURL('image/jpeg',q).split(',')[1];
        if(b64.length*0.75>1000000&&q>0.3){q-=0.1;shrink();}else resolve(b64);
      };
      shrink();
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

async function getVideoFrame(file) {
  return new Promise(res=>{
    const v=document.createElement('video');
    v.muted=true; v.src=URL.createObjectURL(file); v.currentTime=1;
    v.addEventListener('seeked',()=>{
      const c=document.createElement('canvas');
      c.width=v.videoWidth||640; c.height=v.videoHeight||480;
      c.getContext('2d').drawImage(v,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.75).split(',')[1]);
    },{once:true});
    v.load();
  });
}

function setStatus(msg, isErr=false) {
  const el = document.getElementById('scan-status');
  if (!el) return;
  el.innerHTML = msg ? `<div class="${isErr?'error':'status'}">${msg}</div>` : '';
}

async function doScan() {
  if (!scanFiles.length) return;
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  setStatus('Preparing images…');

  const content = [];
  for (const f of scanFiles) {
    try {
      const b64 = f.type.startsWith('video/') ? await getVideoFrame(f) : await resizeImage(f);
      const mt = f.type.startsWith('video/') ? 'image/jpeg' : f.type;
      content.push({type:'image',source:{type:'base64',media_type:mt,data:b64}});
    } catch(e){}
  }

  if (!content.length) { setStatus('Could not read images.', true); btn.disabled=false; return; }

  const notes = (document.getElementById('scan-notes')||{}).value || '';
  content.push({type:'text',text:`You are a master sommelier. Analyse these ${content.length} cellar image(s).

Return ONLY a raw JSON array (no markdown, no backticks) where each object has:
- producer, vintage (string or null), appellation (or null), varietal, condition ("Excellent"/"Good"/"Fair"/"Poor"/"Unknown"), format (or null), quantity (integer or null), notes (or null)
${notes?'\nContext: '+notes:''}`});

  setStatus('Analysing with AI…');

  try {
    const resp = await fetch(PROXY_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content}]})
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message||JSON.stringify(data));
    const raw = data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const wines = JSON.parse(raw);
    const arr = Array.isArray(wines)?wines:[wines];

    // Save to Supabase
    const rows = arr.map(w=>({...w, cellar_id:currentCellar.id, user_id:currentUser.id}));
    const {error} = await sb.from('wines').insert(rows);
    if (error) throw new Error(error.message);

    setStatus(`✓ Added ${arr.length} wine${arr.length!==1?'s':''} to cellar.`);
    scanFiles = [];
    document.getElementById('thumbs').innerHTML = '';
    document.getElementById('scan-notes').value = '';
    btn.disabled = true;
    await loadWines();
  } catch(e) {
    const msg = e.message||'';
    if (msg.includes('403')||msg.includes('not allowed')||msg.includes('failed')) {
      setStatus('Analysis failed. Please enable a VPN (e.g. Proton VPN) and retry.', true);
    } else {
      setStatus('Error: '+msg, true);
    }
    btn.disabled = false;
  }
}

// ── EXPORT ───────────────────────────────────────────────
function exportCSV() {
  const h=['producer','vintage','appellation','varietal','condition','format','quantity','notes'];
  const rows=[h.join(','),...currentWines.map(w=>h.map(k=>`"${(w[k]??'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  dl(rows,`${currentCellar.name}_${today()}.csv`,'text/csv');
}
function exportJSON() { dl(JSON.stringify(currentWines,null,2),`${currentCellar.name}_${today()}.json`,'application/json'); }
function today() { return new Date().toISOString().slice(0,10); }
function dl(content,name,mime) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ── MODAL ────────────────────────────────────────────────
function showModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() { document.getElementById('modal-overlay')?.remove(); }

// ── UTILS ────────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
