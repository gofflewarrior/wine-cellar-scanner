<body>
<div class="app">
  <div class="header">
    <div class="header-eyebrow">Wine Cellar Scanner</div>
    <div class="header-title">Cave à vin</div>
    <div class="header-sub">Scan your cellar — extract producers, vintages &amp; condition</div>
  </div>

  <label style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:1.25rem;margin-bottom:1rem;background:var(--color-surface);border:0.5px solid var(--color-border-strong);border-radius:8px;font-family:&#39;DM Sans&#39;,sans-serif;font-size:14px;font-weight:500;color:var(--color-text);cursor:pointer;box-sizing:border-box;">
    <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0;"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    Add photos or video
    <input type="file" id="fileInputMain" accept="image/*,video/*" multiple="" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;">
  </label>

  <div class="preview-strip" id="previewStrip" style="display:none"></div>

  <div class="controls">
    <div class="field">
      <label>Additional notes (optional)</label>
      <textarea id="notesInput" placeholder="e.g. top shelf left rack, mixed reds, bin A3…"></textarea>
    </div>
    <button class="analyze-btn" id="analyzeBtn" disabled="">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
      Analyse cellar
    </button>
  </div>

  <div class="status-bar" id="statusBar" style="display:none"></div>
  <div class="error-msg" id="errorMsg" style="display:none"></div>

  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="results-title">Identified wines</div>
      <span class="count-badge" id="wineCount">0 bottles</span>
    </div>
    <div class="wine-list" id="wineList"></div>
    <div class="export-row">
      <button class="export-btn" id="csvBtn">Download CSV</button>
      <button class="export-btn" id="jsonBtn">Download JSON</button>
    </div>
  </div>
</div>

<script>
  const fileInputMain = document.getElementById('fileInputMain');
  const previewStrip = document.getElementById('previewStrip');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const statusBar = document.getElementById('statusBar');
  const errorMsg = document.getElementById('errorMsg');
  const resultsSection = document.getElementById('resultsSection');
  const wineList = document.getElementById('wineList');
  const wineCount = document.getElementById('wineCount');
  const notesInput = document.getElementById('notesInput');

  function setStatus(msg, loading = false) {
    statusBar.style.display = 'flex';
    statusBar.innerHTML = loading
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${msg}</span>`;
  }

  function clearStatus() { statusBar.style.display = 'none'; }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    setTimeout(() => { errorMsg.style.display = 'none'; }, 8000);
  }

  function renderPreviews() {
    if (!files.length) { previewStrip.style.display = 'none'; return; }
    previewStrip.style.display = 'flex';
    previewStrip.innerHTML = '';
    files.forEach((f, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'preview-thumb';
      const isVideo = f.type.startsWith('video/');
      if (isVideo) {
        thumb.innerHTML = `<div class="video-placeholder"><span>🎬</span><span class="video-label">video</span></div>`;
      } else {
        const url = URL.createObjectURL(f);
        const img = document.createElement('img');
        img.src = url;
        const btn = document.createElement('button');
        btn.className = 'remove-btn';
        btn.dataset.idx = i;
        btn.textContent = '✕';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          files.splice(parseInt(e.currentTarget.dataset.idx), 1);
          renderPreviews();
          analyzeBtn.disabled = files.length === 0;
        });
        thumb.appendChild(img);
        thumb.appendChild(btn);
      }
      previewStrip.appendChild(thumb);
    });
  }

  function handleFiles(input) {
    if (!input.files || !input.files.length) return;
    const newFiles = Array.from(input.files);
    files = [...files, ...newFiles].slice(0, 6);
    renderPreviews();
    analyzeBtn.disabled = files.length === 0;
    setTimeout(() => { try { input.value = ''; } catch(e) {} }, 100);
  }
  ['change', 'input'].forEach(evt => {
    fileInputMain.addEventListener(evt, () => handleFiles(fileInputMain));
  });

  function conditionClass(cond) {
    const c = (cond || '').toLowerCase();
    if (c.includes('excellent') || c.includes('perfect')) return 'cond-excellent';
    if (c.includes('good')) return 'cond-good';
    if (c.includes('fair') || c.includes('average')) return 'cond-fair';
    if (c.includes('poor') || c.includes('damaged')) return 'cond-poor';
    return 'cond-unknown';
  }

  function renderWines(data) {
    wineList.innerHTML = '';
    if (!data.length) {
      wineList.innerHTML = '<div class="empty-state">No wines detected in the provided images.</div>';
      return;
    }
    data.forEach(w => {
      const card = document.createElement('div');
      card.className = 'wine-card';
      card.innerHTML = `
        <div class="wine-card-top">
          <div class="wine-producer">${w.producer || '—'}</div>
          ${w.vintage ? `<div class="wine-vintage">${w.vintage}</div>` : ''}
        </div>
        ${w.appellation ? `<div class="wine-appellation">${w.appellation}</div>` : ''}
        <div class="wine-meta">
          <div class="meta-item">
            <span class="meta-label">Varietal / Type</span>
            <span class="meta-value">${w.varietal || '—'}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Condition</span>
            <span class="meta-value"><span class="cond-dot ${conditionClass(w.condition)}"></span>${w.condition || '—'}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Format</span>
            <span class="meta-value">${w.format || '—'}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Qty visible</span>
            <span class="meta-value">${w.quantity != null ? w.quantity : '—'}</span>
          </div>
        </div>
        ${w.notes ? `<div class="wine-notes">${w.notes}</div>` : ''}
        <a class="ws-link" href="https://www.wine-searcher.com/find/${encodeURIComponent([w.producer, w.vintage, w.appellation].filter(Boolean).join(' '))}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Search price on Wine-Searcher
          <svg viewBox="0 0 24 24" style="margin-left:2px"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      `;
      wineList.appendChild(card);
    });
  }

  async function toBase64(file) {
    return new Promise((res, rej) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const MAX = 1920;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        let quality = 0.85;
        const tryEncode = () => {
          const data = canvas.toDataURL('image/jpeg', quality).split(',')[1];
          const bytes = Math.ceil(data.length * 3 / 4);
          if (bytes > 4500000 && quality > 0.3) { quality -= 0.1; tryEncode(); }
          else res(data);
        };
        tryEncode();
      };
      img.onerror = () => rej(new Error('Image load failed'));
      img.src = url;
    });
  }

  async function extractVideoFrame(file) {
    return new Promise((res) => {
      const video = document.createElement('video');
      video.src = URL.createObjectURL(file);
      video.crossOrigin = 'anonymous';
      video.muted = true;
      video.currentTime = 1;
      video.addEventListener('seeked', () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
      }, { once: true });
      video.load();
    });
  }

  analyzeBtn.addEventListener('click', async () => {
    if (!files.length) return;
    analyzeBtn.disabled = true;
    clearStatus();
    errorMsg.style.display = 'none';
    resultsSection.style.display = 'none';

    const imageFiles = files.filter(f => f.type.startsWith('image/'));
    const videoFiles = files.filter(f => f.type.startsWith('video/'));

    setStatus('Preparing images…', true);

    const content = [];
    for (const f of imageFiles) {
      try {
        const b64 = await toBase64(f);
        content.push({ type: 'image', source: { type: 'base64', media_type: f.type, data: b64 } });
      } catch(e) {}
    }
    for (const f of videoFiles) {
      try {
        setStatus(`Extracting frame from ${f.name}…`, true);
        const b64 = await extractVideoFrame(f);
        content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } });
      } catch(e) {}
    }

    if (!content.length) {
      showError('Could not read any files. Please try again.');
      analyzeBtn.disabled = false;
      return;
    }

    const notes = notesInput.value.trim();
    content.push({ type: 'text', text: `You are a master sommelier and wine cellar expert. Analyse the provided ${content.length} image(s) of a wine cellar or wine rack.

Extract EVERY visible wine bottle or label. For each, return a JSON array of objects with these fields:
- producer: winery / domaine / château name
- vintage: year as a string (or null if not visible)
- appellation: AOC/region/denomination if visible
- varietal: grape variety or wine type (e.g. "Cabernet Sauvignon", "Champagne Brut")
- condition: one of "Excellent", "Good", "Fair", "Poor", or "Unknown" — assess label clarity, fill level if visible, cork condition
- format: bottle size if discernible (e.g. "750ml", "Magnum", "Jeroboam"), else null
- quantity: number of bottles of this exact wine visible as an integer, or null
- notes: any additional observations (e.g. "label partially torn", "low fill level", "bin label reads A3")

${notes ? `User context: ${notes}` : ''}

Respond ONLY with valid JSON — a raw JSON array, no markdown, no preamble, no backticks.` });

    setStatus('Analysing with AI…', true);

    try {
      const resp = await fetch('https://wine-proxy.nicole-lew.workers.dev/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4000,
          messages: [{ role: 'user', content }]
        })
      });

      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error?.message || JSON.stringify(data));

      const raw = data.content.map(b => b.text || '').join('').trim();
      const clean = raw.replace(/```json|```/g, '').trim();
      let parsed;
      try { parsed = JSON.parse(clean); }
      catch(e) { throw new Error('Could not parse AI response. Please retry.'); }

      wines = Array.isArray(parsed) ? parsed : [parsed];
      renderWines(wines);
      wineCount.textContent = wines.length === 1 ? '1 bottle' : `${wines.length} bottles`;
      resultsSection.style.display = 'block';
      clearStatus();
      setStatus(`Found ${wines.length} wine${wines.length !== 1 ? 's' : ''}. Ready to export.`);
    } catch(e) {
      showError(e.message || 'Analysis failed. Please try again.');
      clearStatus();
    }

    analyzeBtn.disabled = false;
  });

  function toCSV(data) {
    const headers = ['producer','vintage','appellation','varietal','condition','format','quantity','notes'];
    const rows = data.map(w => headers.map(h => {
      const v = (w[h] ?? '').toString().replace(/"/g, '""');
      return `"${v}"`;
    }).join(','));
    return [headers.join(','), ...rows].join('\n');
  }

  function download(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  document.getElementById('csvBtn').addEventListener('click', () => {
    if (!wines.length) return;
    download(toCSV(wines), `cellar_scan_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
  });

  document.getElementById('jsonBtn').addEventListener('click', () => {
    if (!wines.length) return;
    download(JSON.stringify(wines, null, 2), `cellar_scan_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
  });
</script>
