<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cave à vin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f2; color: #1a1916; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 13px; color: #666; margin-bottom: 24px; }
.pick-btn { display: block; width: 100%; padding: 18px; background: #fff; border: 1.5px solid #ccc; border-radius: 12px; font-size: 15px; font-weight: 500; color: #1a1916; text-align: center; cursor: pointer; margin-bottom: 12px; }
.pick-btn:active { background: #f0ede8; }
#thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid #ddd; }
textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; background: #fff; margin-bottom: 12px; }
#analyseBtn { display: block; width: 100%; padding: 16px; background: #1a1916; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
#analyseBtn:disabled { opacity: 0.4; cursor: default; }
#analyseBtn:active { opacity: 0.8; }
.status { padding: 12px; background: #eee; border-radius: 8px; font-size: 13px; color: #555; margin-bottom: 12px; text-align: center; }
.error { padding: 12px; background: #fdf0f0; border: 1px solid #f5c1c1; border-radius: 8px; font-size: 13px; color: #9b2c2c; margin-bottom: 12px; }
.card { background: #fff; border: 1px solid #e0ddd8; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
.card-producer { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.card-app { font-size: 13px; color: #888; font-style: italic; margin-bottom: 10px; }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.card-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #aaa; margin-bottom: 2px; }
.card-field span { font-size: 13px; font-weight: 500; }
.card-notes { font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 8px; margin-top: 4px; }
.ws-link { display: inline-block; margin-top: 10px; font-size: 12px; color: #555; border: 1px solid #ddd; border-radius: 6px; padding: 5px 10px; text-decoration: none; }
.vintage-badge { display: inline-block; font-size: 11px; font-weight: 600; background: #f0ede8; border-radius: 5px; padding: 2px 7px; margin-left: 8px; vertical-align: middle; }
.export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.export-btn { padding: 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <h1>Cave à vin</h1>
  <p class="sub">Scan your cellar — extract producers, vintages &amp; condition</p>

  <label class="pick-btn" for="filePicker">
    📷 &nbsp;Add photos or video
  </label>
  <input type="file" id="filePicker" accept="image/*,video/*" multiple style="position:fixed;top:-100px;left:-100px;width:1px;height:1px;opacity:0;">

  <div id="thumbs"></div>

  <textarea id="notes" rows="2" placeholder="Notes (optional) — e.g. top shelf, bin A3…"></textarea>

  <button id="analyseBtn" disabled>Analyse cellar</button>

  <div id="status" style="display:none"></div>
  <div id="error" style="display:none"></div>
  <div id="results"></div>
</div>

<script>
const picker = document.getElementById('filePicker');
const thumbsEl = document.getElementById('thumbs');
const analyseBtn = document.getElementById('analyseBtn');
const statusEl = document.getElementById('status');
const errorEl = document.getElementById('error');
const resultsEl = document.getElementById('results');
const notesEl = document.getElementById('notes');

let files = [];
let wines = [];

picker.addEventListener('change', function() {
  if (!this.files || !this.files.length) return;
  files = [...files, ...Array.from(this.files)].slice(0, 6);
  renderThumbs();
  analyseBtn.disabled = false;
});

function renderThumbs() {
  thumbsEl.innerHTML = '';
  files.forEach((f, i) => {
    if (f.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = URL.createObjectURL(f);
      thumbsEl.appendChild(img);
    } else {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.style.cssText = 'display:flex;align-items:center;justify-content:center;background:#eee;font-size:28px;';
      div.textContent = '🎬';
      thumbsEl.appendChild(div);
    }
  });
}

function setStatus(msg) { statusEl.className = 'status'; statusEl.textContent = msg; statusEl.style.display = 'block'; }
function clearStatus() { statusEl.style.display = 'none'; }
function showError(msg) { errorEl.className = 'error'; errorEl.textContent = msg; errorEl.style.display = 'block'; }
function clearError() { errorEl.style.display = 'none'; }

async function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let q = 0.7;
      const shrink = () => {
        const b64 = canvas.toDataURL('image/jpeg', q).split(',')[1];
        const bytes = Math.ceil(b64.length * 3 / 4);
        if (bytes > 1000000 && q > 0.3) { q -= 0.1; shrink(); }
        else resolve(b64);
      };
      shrink();
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function getVideoFrame(file) {
  return new Promise((resolve) => {
    const video = document.createElement('video');
    video.muted = true;
    video.src = URL.createObjectURL(file);
    video.currentTime = 1;
    video.addEventListener('seeked', () => {
      const c = document.createElement('canvas');
      c.width = video.videoWidth || 640; c.height = video.videoHeight || 480;
      c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.8).split(',')[1]);
    }, { once: true });
    video.load();
  });
}

analyseBtn.addEventListener('click', async () => {
  if (!files.length) return;
  analyseBtn.disabled = true;
  clearError();
  resultsEl.innerHTML = '';
  setStatus('Preparing images…');

  const content = [];
  for (const f of files) {
    try {
      const b64 = f.type.startsWith('video/') ? await getVideoFrame(f) : await resizeImage(f);
      const mt = f.type.startsWith('video/') ? 'image/jpeg' : f.type;
      content.push({ type: 'image', source: { type: 'base64', media_type: mt, data: b64 } });
    } catch(e) { console.error(e); }
  }

  if (!content.length) { showError('Could not read images. Please try again.'); analyseBtn.disabled = false; clearStatus(); return; }

  const notes = notesEl.value.trim();
  content.push({ type: 'text', text: `You are a master sommelier. Analyse these ${content.length} cellar image(s) and extract every visible wine bottle or label.

Return ONLY a raw JSON array (no markdown, no backticks) where each object has:
- producer: winery/domaine/château name
- vintage: year as string or null
- appellation: region/AOC or null
- varietal: grape variety or wine type
- condition: "Excellent", "Good", "Fair", "Poor", or "Unknown"
- format: bottle size or null
- quantity: integer count visible or null
- notes: observations or null
${notes ? '\nContext: ' + notes : ''}` });

  setStatus('Analysing with AI…');

  try {
    const resp = await fetch('https://api.cellarlegacy.com/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4000, messages: [{ role: 'user', content }] })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ': ' + (data.error?.message || JSON.stringify(data)));
    const raw = data.content.map(b => b.text || '').join('').trim().replace(/```json|```/g, '').trim();
    wines = JSON.parse(raw);
    if (!Array.isArray(wines)) wines = [wines];
    renderResults();
    clearStatus();
    setStatus('Found ' + wines.length + ' wine' + (wines.length !== 1 ? 's' : '') + '. Ready to export.');
  } catch(e) {
    showError('Error: ' + (e.message || JSON.stringify(e)));
    clearStatus();
  }
  analyseBtn.disabled = false;
});

function condDot(c) {
  const s = (c||'').toLowerCase();
  const col = s.includes('excellent') ? '#1D9E75' : s.includes('good') ? '#639922' : s.includes('fair') ? '#BA7517' : s.includes('poor') ? '#E24B4A' : '#aaa';
  return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col};margin-right:4px;vertical-align:middle;"></span>`;
}

function renderResults() {
  resultsEl.innerHTML = '';
  if (!wines.length) { resultsEl.innerHTML = '<p style="text-align:center;color:#aaa;padding:20px;">No wines detected.</p>'; return; }
  wines.forEach(w => {
    const q = encodeURIComponent([w.producer, w.vintage, w.appellation].filter(Boolean).join(' '));
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-producer">${w.producer || '—'}<span class="vintage-badge">${w.vintage || '?'}</span></div>
      ${w.appellation ? `<div class="card-app">${w.appellation}</div>` : ''}
      <div class="card-grid">
        <div class="card-field"><label>Varietal</label><span>${w.varietal || '—'}</span></div>
        <div class="card-field"><label>Condition</label><span>${condDot(w.condition)}${w.condition || '—'}</span></div>
        <div class="card-field"><label>Format</label><span>${w.format || '—'}</span></div>
        <div class="card-field"><label>Qty visible</label><span>${w.quantity ?? '—'}</span></div>
      </div>
      ${w.notes ? `<div class="card-notes">${w.notes}</div>` : ''}
      <a class="ws-link" href="https://www.wine-searcher.com/find/${q}" target="_blank">Search price on Wine-Searcher ↗</a>
    `;
    resultsEl.appendChild(card);
  });
  const row = document.createElement('div');
  row.className = 'export-row';
  row.innerHTML = `<button class="export-btn" id="csvBtn">Download CSV</button><button class="export-btn" id="jsonBtn">Download JSON</button>`;
  resultsEl.appendChild(row);
  document.getElementById('csvBtn').onclick = exportCSV;
  document.getElementById('jsonBtn').onclick = exportJSON;
}

function exportCSV() {
  const h = ['producer','vintage','appellation','varietal','condition','format','quantity','notes'];
  const rows = [h.join(','), ...wines.map(w => h.map(k => `"${(w[k]??'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  dl(rows, `cellar_${today()}.csv`, 'text/csv');
}
function exportJSON() { dl(JSON.stringify(wines, null, 2), `cellar_${today()}.json`, 'application/json'); }
function today() { return new Date().toISOString().slice(0,10); }
function dl(content, name, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
